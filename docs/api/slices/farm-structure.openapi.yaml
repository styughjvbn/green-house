openapi: 3.1.0
info:
  title: Greenhouse API Slice - farm-structure
  version: 0.0.1
servers:
- url: http://localhost:8080
  description: Generated server url
paths:
  /api/orchid-groups:
    get:
      tags:
      - orchid-group-query-controller
      operationId: getOrchidGroups
      parameters:
      - name: houseId
        in: query
        required: false
        schema:
          type: integer
          format: int64
      - name: keyword
        in: query
        required: false
        schema:
          type: string
      - name: physicalBedId
        in: query
        required: false
        schema:
          type: integer
          format: int64
      - name: bedZoneId
        in: query
        required: false
        schema:
          type: integer
          format: int64
      - name: status
        in: query
        required: false
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseListOrchidGroupResponse'
  /api/physical-beds:
    get:
      tags:
      - farm-structure-controller
      operationId: getPhysicalBeds
      parameters:
      - name: houseId
        in: query
        required: true
        schema:
          type: integer
          format: int64
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseListPhysicalBedResponse'
  /api/physical-beds/{physicalBedId}:
    get:
      tags:
      - farm-structure-controller
      operationId: getPhysicalBed
      parameters:
      - name: physicalBedId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponsePhysicalBedResponse'
  /api/houses:
    get:
      tags:
      - farm-structure-controller
      operationId: getHouses
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseListHouseResponse'
  /api/houses/{houseId}:
    get:
      tags:
      - farm-structure-controller
      operationId: getHouse
      parameters:
      - name: houseId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseHouseResponse'
  /api/bed-zones:
    get:
      tags:
      - farm-structure-controller
      operationId: getBedZones
      parameters:
      - name: houseId
        in: query
        required: false
        schema:
          type: integer
          format: int64
      - name: physicalBedId
        in: query
        required: false
        schema:
          type: integer
          format: int64
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseListBedZoneResponse'
  /api/bed-zones/{bedZoneId}:
    get:
      tags:
      - farm-structure-controller
      operationId: getBedZone
      parameters:
      - name: bedZoneId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseBedZoneResponse'
components:
  schemas:
    ApiResponseBedZoneResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/BedZoneResponse'
        message:
          type: string
    ApiResponseHouseResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/HouseResponse'
        message:
          type: string
    ApiResponseListBedZoneResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/BedZoneResponse'
        message:
          type: string
    ApiResponseListHouseResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/HouseResponse'
        message:
          type: string
    ApiResponseListOrchidGroupResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/OrchidGroupResponse'
        message:
          type: string
    ApiResponseListPhysicalBedResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/PhysicalBedResponse'
        message:
          type: string
    ApiResponsePhysicalBedResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/PhysicalBedResponse'
        message:
          type: string
    BedZoneResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        physicalBedId:
          type: integer
          format: int64
        physicalBedNumber:
          type: integer
          format: int32
        houseId:
          type: integer
          format: int64
        houseNumber:
          type: integer
          format: int32
        name:
          type: string
        side:
          type: string
          enum:
          - LEFT
          - RIGHT
          - CUSTOM
          - HANGING
        zoneType:
          type: string
          enum:
          - DEFAULT
          - CUSTOM
          - HANGING
          - TRAY
          - GRID
        sortOrder:
          type: integer
          format: int32
        active:
          type: boolean
        memo:
          type: string
        orchidGroups:
          type: array
          items:
            $ref: '#/components/schemas/OrchidGroupResponse'
    HouseResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        number:
          type: integer
          format: int32
        name:
          type: string
        memo:
          type: string
        physicalBeds:
          type: array
          items:
            $ref: '#/components/schemas/PhysicalBedResponse'
    OrchidGroupResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        bedZoneId:
          type: integer
          format: int64
        varietyId:
          type: integer
          format: int64
        genus:
          type: string
        varietyName:
          type: string
        quantity:
          type: integer
          format: int32
        potSize:
          type: string
        potSizeCode:
          type: string
          enum:
          - UNSPECIFIED
          - UNMAPPED
          - POT_2
          - POT_2_5
          - POT_3
          - POT_3_5
          - POT_4
          - POT_4_5
          - POT_5
          - POT_6
          - HANGING
          - ETC
        ageYear:
          type: integer
          format: int32
        status:
          type: string
        placementType:
          type: string
        trayCount:
          type: integer
          format: int32
        splitPlacementAllowed:
          type: boolean
        startPosition:
          type: number
        endPosition:
          type: number
        sortOrder:
          type: integer
          format: int32
        memo:
          type: string
        houseId:
          type: integer
          format: int64
        houseNumber:
          type: integer
          format: int32
        physicalBedNumber:
          type: integer
          format: int32
        bedZoneName:
          type: string
    PhysicalBedResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        houseId:
          type: integer
          format: int64
        houseNumber:
          type: integer
          format: int32
        number:
          type: integer
          format: int32
        displayOrder:
          type: integer
          format: int32
        lengthCm:
          type: integer
          format: int32
        widthCm:
          type: integer
          format: int32
        wireCount:
          type: integer
          format: int32
        supportIntervalCm:
          type: integer
          format: int32
        positionUnitCount:
          type: number
        positionUnitLabel:
          type: string
        memo:
          type: string
        bedZones:
          type: array
          items:
            $ref: '#/components/schemas/BedZoneResponse'
