      - quantity
      - status
      - varietyId
    RepotResultOrchidGroupRequest:
      type: object
      properties:
        bedZoneId:
          type: integer
          format: int64
        quantity:
          type: integer
          format: int32
          minimum: 1
        potSize:
          type: string
          maxLength: 50
          minLength: 0
        ageYear:
          type: integer
          format: int32
          minimum: 0
        placementType:
          type: string
          maxLength: 50
          minLength: 0
        trayCount:
          type: integer
          format: int32
          minimum: 0
        splitPlacementAllowed:
          type: boolean
        startPosition:
          type: number
          minimum: 0.0
        endPosition:
          type: number
          minimum: 0.0
        memo:
          type: string
          maxLength: 1000
          minLength: 0
      required:
      - bedZoneId
      - endPosition
      - quantity
      - startPosition
    RepotWorkOperationRequest:
      type: object
      properties:
        idempotencyKey:
          type: string
          maxLength: 100
          minLength: 0
        title:
          type: string
          maxLength: 150
          minLength: 0
        workDate:
          type: string
          format: date
        worker:
          type: string
          maxLength: 100
          minLength: 0
        memo:
          type: string
          maxLength: 1000
