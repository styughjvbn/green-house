          - IN_PROGRESS
          - PAUSED
          - COMPLETED
          - CANCELED
          - CORRECTED
        plannedStartDate:
          type: string
          format: date
        plannedEndDate:
          type: string
          format: date
        actualStartAt:
          type: string
          format: date-time
        actualEndAt:
          type: string
          format: date-time
        sourceScopeType:
          type: string
          enum:
          - NONE
          - FARM
          - HOUSE
          - PHYSICAL_BED
          - BED_ZONE
          - ORCHID_GROUP
          - DERIVED_GROUP
          - USER_COLLECTION
          - MANUAL_SELECTION
          - INBOUND_RECORD_SELECTION
        sourceScopeId:
          type: integer
          format: int64
        sourceConditionSnapshot:
          type: object
          additionalProperties: {}
        targetSnapshotAt:
          type: string
          format: date-time
        details:
          type: object
          additionalProperties: {}
        worker:
          type: string
        memo:
          type: string
        progress:
          $ref: '#/components/schemas/WorkOperationProgressResponse'
        targets:
          type: array
          items:
            $ref: '#/components/schemas/WorkOperationTargetResponse'
