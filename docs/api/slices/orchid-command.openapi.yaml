openapi: 3.1.0
info:
  title: Greenhouse API Slice - orchid-command
  version: 0.0.1
servers:
- url: http://localhost:8080
  description: Generated server url
paths:
  /api/bed-zones/{bedZoneId}/placement-profile:
    get:
      tags:
      - bed-placement-controller
      operationId: get_1
      parameters:
      - name: bedZoneId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseBedZonePlacementProfileResponse'
    put:
      tags:
      - bed-placement-controller
      operationId: update_2
      parameters:
      - name: bedZoneId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BedZonePlacementProfileRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseBedZonePlacementProfileResponse'
  /api/work-operations/{workOperationId}/cancel-created-orchid-groups:
    post:
      tags:
      - multi-create-work-operation-controller
      operationId: cancel_1
      parameters:
      - name: workOperationId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseMultiCreateWorkOperationResponse'
  /api/work-operations/repot:
    post:
      tags:
      - repot-work-operation-controller
      operationId: execute
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RepotWorkOperationRequest'
        required: true
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseRepotWorkOperationResponse'
  /api/work-operations/multi-create:
    post:
      tags:
      - multi-create-work-operation-controller
      operationId: create_1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MultiCreateWorkOperationRequest'
        required: true
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseMultiCreateWorkOperationResponse'
  /api/orchid-groups:
    post:
      tags:
      - orchid-group-command-controller
      operationId: create_3
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrchidGroupCreateRequest'
        required: true
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseOrchidGroupResponse'
  /api/orchid-groups/{orchidGroupId}:
    delete:
      tags:
      - orchid-group-command-controller
      operationId: delete_1
      parameters:
      - name: orchidGroupId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseVoid'
    patch:
      tags:
      - orchid-group-command-controller
      operationId: update_4
      parameters:
      - name: orchidGroupId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrchidGroupUpdateRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseOrchidGroupResponse'
  /api/orchid-groups/{orchidGroupId}/move:
    patch:
      tags:
      - orchid-group-command-controller
      operationId: move
      parameters:
      - name: orchidGroupId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrchidGroupMoveRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseOrchidGroupResponse'
  /api/work-operations/{workOperationId}/repot-results:
    get:
      tags:
      - repot-work-operation-controller
      operationId: get_4
      parameters:
      - name: workOperationId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseRepotWorkOperationResponse'
  /api/work-operations/{workOperationId}/created-orchid-groups:
    get:
      tags:
      - multi-create-work-operation-controller
      operationId: get_5
      parameters:
      - name: workOperationId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseMultiCreateWorkOperationResponse'
  /api/work-operations/{workOperationId}/cancel-eligibility:
    get:
      tags:
      - multi-create-work-operation-controller
      operationId: getCancellationEligibility
      parameters:
      - name: workOperationId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseMultiCreateCancellationEligibilityResponse'
components:
  schemas:
    ApiResponseBedZonePlacementProfileResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/BedZonePlacementProfileResponse'
        message:
          type: string
    ApiResponseMultiCreateCancellationEligibilityResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/MultiCreateCancellationEligibilityResponse'
        message:
          type: string
    ApiResponseMultiCreateWorkOperationResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/MultiCreateWorkOperationResponse'
        message:
          type: string
    ApiResponseOrchidGroupResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/OrchidGroupResponse'
        message:
          type: string
    ApiResponseRepotWorkOperationResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/RepotWorkOperationResponse'
        message:
          type: string
    ApiResponseVoid:
      type: object
      properties:
        data: {}
        message:
          type: string
    BedZoneCapacityRequest:
      type: object
      properties:
        placementType:
          type: string
          maxLength: 100
          minLength: 0
        potSize:
          type: string
          maxLength: 50
          minLength: 0
        capacityMode:
          type: string
          enum:
          - SPACIOUS
          - STANDARD
          - EXPANDED
          - COMPRESSED
          - TEMPORARY
        capacityValue:
          type: integer
          format: int32
          minimum: 0
        unitSpan:
          type: number
          minimum: 0.0
        allowed:
          type: boolean
        memo:
          type: string
          maxLength: 1000
          minLength: 0
      required:
      - allowed
      - capacityMode
      - capacityValue
      - placementType
      - unitSpan
    BedZoneCapacityResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        placementType:
          type: string
        potSize:
          type: string
        capacityMode:
          type: string
          enum:
          - SPACIOUS
          - STANDARD
          - EXPANDED
          - COMPRESSED
          - TEMPORARY
        unitSpan:
          type: number
        capacityValue:
          type: integer
          format: int32
        allowed:
          type: boolean
        memo:
          type: string
    BedZonePlacementProfileRequest:
      type: object
      properties:
        capacities:
          type: array
          items:
            $ref: '#/components/schemas/BedZoneCapacityRequest'
          minItems: 1
      required:
      - capacities
    BedZonePlacementProfileResponse:
      type: object
      properties:
        bedZoneId:
          type: integer
          format: int64
        bedZoneName:
          type: string
        houseNumber:
          type: integer
          format: int32
        physicalBedNumber:
          type: integer
          format: int32
        positionUnitCount:
          type: number
        positionUnitLabel:
          type: string
        capacities:
          type: array
          items:
            $ref: '#/components/schemas/BedZoneCapacityResponse'
    Blocker:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        count:
          type: integer
          format: int64
    MultiCreateCancellationEligibilityResponse:
      type: object
      properties:
        workOperationId:
          type: integer
          format: int64
        cancelable:
          type: boolean
        createdOrchidGroupIds:
          type: array
          items:
            type: integer
            format: int64
        blockers:
          type: array
          items:
            $ref: '#/components/schemas/Blocker'
    MultiCreateOrchidGroupRowRequest:
      type: object
      properties:
        orchidGroup:
          $ref: '#/components/schemas/OrchidGroupCreateRequest'
        collectionIds:
          type: array
          items:
            type: integer
            format: int64
          maxItems: 20
          minItems: 0
          uniqueItems: true
      required:
      - orchidGroup
    MultiCreateWorkOperationRequest:
      type: object
      properties:
        idempotencyKey:
          type: string
          maxLength: 100
          minLength: 0
        title:
          type: string
          maxLength: 150
          minLength: 0
        workDate:
          type: string
          format: date
        worker:
          type: string
          maxLength: 100
          minLength: 0
        memo:
          type: string
          maxLength: 1000
          minLength: 0
        rows:
          type: array
          items:
            $ref: '#/components/schemas/MultiCreateOrchidGroupRowRequest'
          maxItems: 100
          minItems: 0
      required:
      - idempotencyKey
      - rows
      - title
      - workDate
    MultiCreateWorkOperationResponse:
      type: object
      properties:
        operation:
          $ref: '#/components/schemas/WorkOperationResponse'
        createdOrchidGroups:
          type: array
          items:
            $ref: '#/components/schemas/OrchidGroupResponse'
    OrchidGroupCreateRequest:
      type: object
      properties:
        bedZoneId:
          type: integer
          format: int64
        varietyId:
          type: integer
          format: int64
        quantity:
