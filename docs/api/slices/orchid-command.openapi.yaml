          format: int32
          minimum: 1
        potSize:
          type: string
          maxLength: 50
          minLength: 0
        ageYear:
          type: integer
          format: int32
          minimum: 0
        status:
          type: string
          maxLength: 50
          minLength: 0
        placementType:
          type: string
          maxLength: 50
          minLength: 0
        trayCount:
          type: integer
          format: int32
          minimum: 0
        splitPlacementAllowed:
          type: boolean
        startPosition:
          type: number
          minimum: 0.0
        endPosition:
          type: number
          minimum: 0.0
        memo:
          type: string
          maxLength: 1000
          minLength: 0
      required:
      - bedZoneId
      - quantity
      - status
      - varietyId
    OrchidGroupMoveRequest:
      type: object
      properties:
        toBedZoneId:
          type: integer
          format: int64
        startPosition:
          type: number
          minimum: 0.0
        endPosition:
          type: number
          minimum: 0.0
        worker:
          type: string
          maxLength: 100
          minLength: 0
        memo:
          type: string
          maxLength: 1000
          minLength: 0
      required:
      - toBedZoneId
    OrchidGroupResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        bedZoneId:
          type: integer
          format: int64
        varietyId:
          type: integer
          format: int64
        genus:
          type: string
        varietyName:
          type: string
        quantity:
          type: integer
          format: int32
        potSize:
          type: string
        potSizeCode:
          type: string
          enum:
          - UNSPECIFIED
          - UNMAPPED
          - POT_2
          - POT_2_5
          - POT_3
          - POT_3_5
          - POT_4
          - POT_4_5
          - POT_5
          - POT_6
          - HANGING
          - ETC
        ageYear:
          type: integer
          format: int32
        status:
          type: string
        placementType:
          type: string
        trayCount:
          type: integer
          format: int32
        splitPlacementAllowed:
          type: boolean
        startPosition:
          type: number
        endPosition:
          type: number
        sortOrder:
          type: integer
          format: int32
        memo:
          type: string
        houseId:
          type: integer
          format: int64
        houseNumber:
          type: integer
          format: int32
        physicalBedNumber:
          type: integer
          format: int32
        bedZoneName:
          type: string
    OrchidGroupUpdateRequest:
      type: object
      properties:
        varietyId:
          type: integer
          format: int64
        quantity:
          type: integer
          format: int32
          minimum: 1
        potSize:
          type: string
          maxLength: 50
          minLength: 0
        ageYear:
          type: integer
          format: int32
          minimum: 0
        status:
          type: string
          maxLength: 50
          minLength: 0
        placementType:
          type: string
          maxLength: 50
          minLength: 0
        trayCount:
          type: integer
          format: int32
          minimum: 0
        splitPlacementAllowed:
          type: boolean
        startPosition:
          type: number
          minimum: 0.0
        endPosition:
          type: number
          minimum: 0.0
        memo:
          type: string
          maxLength: 1000
          minLength: 0
