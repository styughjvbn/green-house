          format: int32
          minimum: 1
        lossQuantity:
          type: integer
          format: int32
          minimum: 0
        lossReason:
          type: string
          maxLength: 1000
          minLength: 0
        results:
          type: array
          items:
            $ref: '#/components/schemas/RepotResultOrchidGroupRequest'
          maxItems: 100
          minItems: 0
        inheritCollectionIds:
          type: array
          items:
            type: integer
            format: int64
          maxItems: 20
          minItems: 0
          uniqueItems: true
      required:
      - idempotencyKey
      - inputQuantity
      - lossQuantity
      - results
      - sourceOrchidGroupId
      - title
      - workDate
    RepotWorkOperationResponse:
      type: object
      properties:
        operation:
