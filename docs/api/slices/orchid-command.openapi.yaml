      type: object
      properties:
        id:
          type: integer
          format: int64
        targetReferenceType:
          type: string
          enum:
          - ORCHID_GROUP
          - INBOUND_RECORD
        orchidGroupId:
          type: integer
          format: int64
        inboundRecordId:
          type: integer
          format: int64
        inclusionSource:
          type: string
          enum:
          - DIRECT
          - FARM
          - HOUSE
          - PHYSICAL_BED
          - BED_ZONE
          - DERIVED_GROUP
          - USER_COLLECTION
          - MANUAL_ADDITION
          - INBOUND_RECORD
          - LINEAGE
        varietyName:
          type: string
        quantitySnapshot:
          type: integer
          format: int32
        ageYearSnapshot:
          type: integer
          format: int32
        potSizeCodeSnapshot:
          type: string
        potSizeSnapshot:
          type: string
        locationSnapshot:
          type: object
          additionalProperties: {}
        processedQuantity:
          type: integer
          format: int32
        remainingQuantity:
          type: integer
          format: int32
        executionStatus:
          type: string
          enum:
          - PENDING
          - IN_PROGRESS
          - PARTIALLY_COMPLETED
          - COMPLETED
          - SKIPPED
          - CANCELED
          - FAILED
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
        effectAppliedAt:
          type: string
          format: date-time
        worker:
          type: string
        resultDetails:
          type: object
          additionalProperties: {}
