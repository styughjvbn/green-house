openapi: 3.1.0
info:
  title: Greenhouse API Slice - 판매 전표
  version: v0
  description: 판매 전표 조회·생성·출력, 경매 출하 전표 후보 API
servers:
- url: http://localhost:8080
  description: Generated server url
paths:
  /api/sales-slips:
    get:
      tags:
      - sales-controller
      operationId: getSalesSlips
      parameters:
      - name: partnerId
        in: query
        required: false
        schema:
          type: integer
          format: int64
      - name: from
        in: query
        required: false
        schema:
          type: string
          format: date
      - name: to
        in: query
        required: false
        schema:
          type: string
          format: date
      responses:
        '200':
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ApiResponseListSalesSlipResponse'
    post:
      tags:
      - sales-controller
      operationId: createSalesSlip
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SalesSlipCreateRequest'
        required: true
      responses:
        '201':
          description: Created
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ApiResponseSalesSlipResponse'
  /api/sales-slips/{salesSlipId}:
    get:
      tags:
      - sales-controller
      operationId: getSalesSlip
      parameters:
      - name: salesSlipId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        '200':
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ApiResponseSalesSlipResponse'
  /api/sales-slips/{salesSlipId}/print:
    get:
      tags:
      - sales-controller
      operationId: getSalesSlipPrintData
      parameters:
      - name: salesSlipId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        '200':
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ApiResponseSalesSlipResponse'
  /api/sales-slips/auction-shipments:
    get:
      tags:
      - sales-controller
      operationId: getAuctionShipmentOptions
      responses:
        '200':
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ApiResponseListAuctionShipmentOptionResponse'
components:
  schemas:
    ApiResponseListAuctionShipmentOptionResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/AuctionShipmentOptionResponse'
        message:
          type: string
    ApiResponseListSalesSlipResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/SalesSlipResponse'
        message:
          type: string
    ApiResponseSalesSlipResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/SalesSlipResponse'
        message:
          type: string
    AuctionShipmentOptionResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        shipmentDate:
          type: string
          format: date
        auctionHouseId:
          type: integer
          format: int64
        auctionMarket:
          type: string
        lots:
          type: array
          items:
            $ref: '#/components/schemas/Lot'
    BusinessPartnerResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        partnerType:
          type: string
          enum:
          - WHOLESALE
          - RETAIL
          - AUCTION_HOUSE
        ownerName:
          type: string
        phone:
          type: string
        address:
          type: string
        memo:
          type: string
        active:
          type: boolean
    Lot:
      type: object
      properties:
        id:
          type: integer
          format: int64
        itemName:
          type: string
        varietyName:
          type: string
        shipmentGrade:
          type: string
        shippedQuantity:
          type: integer
          format: int32
    SalesSlipCreateRequest:
      type: object
      properties:
        saleDate:
          type: string
          format: date
        salesType:
          type: string
          enum:
          - DIRECT
          - AUCTION
        partnerId:
          type: integer
          format: int64
        auctionShipmentId:
          type: integer
          format: int64
        paymentStatus:
          type: string
          maxLength: 50
          minLength: 0
        salesStatus:
          type: string
          maxLength: 50
          minLength: 0
        paymentMethod:
          type: string
          maxLength: 50
          minLength: 0
        memo:
          type: string
          maxLength: 1000
          minLength: 0
        items:
          type: array
          items:
            $ref: '#/components/schemas/SalesSlipItemRequest'
      required:
      - items
      - saleDate
    SalesSlipItemRequest:
      type: object
      properties:
        orchidGroupId:
          type: integer
          format: int64
        itemName:
          type: string
          maxLength: 150
          minLength: 0
        genus:
          type: string
          maxLength: 100
          minLength: 0
        spec:
          type: string
          maxLength: 100
          minLength: 0
        quantity:
          type: integer
          format: int32
          minimum: 1
        unitPrice:
          type: integer
          format: int32
          minimum: 0
        memo:
          type: string
          maxLength: 1000
          minLength: 0
      required:
      - itemName
      - quantity
      - unitPrice
    SalesSlipItemResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        orchidGroupId:
          type: integer
          format: int64
        auctionShipmentLotId:
          type: integer
          format: int64
        itemName:
          type: string
        genus:
          type: string
        spec:
          type: string
        quantity:
          type: integer
          format: int32
        unitPrice:
          type: integer
          format: int32
        amount:
          type: integer
          format: int32
        memo:
          type: string
    SalesSlipResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        slipNumber:
          type: string
        saleDate:
          type: string
          format: date
        salesType:
          type: string
          enum:
          - DIRECT
          - AUCTION
        auctionShipmentId:
          type: integer
          format: int64
        auctionMarket:
          type: string
        partner:
          $ref: '#/components/schemas/BusinessPartnerResponse'
        totalAmount:
          type: integer
          format: int32
        expectedPaymentDate:
          type: string
          format: date
        paidAmount:
          type: integer
          format: int64
        remainingAmount:
          type: integer
          format: int64
        paymentStatus:
          type: string
        salesStatus:
          type: string
        paymentMethod:
          type: string
        memo:
          type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/SalesSlipItemResponse'
