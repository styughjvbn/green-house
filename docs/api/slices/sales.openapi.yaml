openapi: 3.1.0
info:
  title: Greenhouse API Slice - sales
  version: 0.0.1
servers:
- url: http://localhost:8080
  description: Generated server url
paths:
  /api/sales-slips/{salesSlipId}:
    get:
      tags:
      - sales-controller
      operationId: getSalesSlip
      parameters:
      - name: salesSlipId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseSalesSlipResponse'
    put:
      tags:
      - sales-controller
      operationId: updateSalesSlip
      parameters:
      - name: salesSlipId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SalesSlipCreateRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseSalesSlipResponse'
  /api/sales-slips:
    get:
      tags:
      - sales-controller
      operationId: getSalesSlips
      parameters:
      - name: partnerId
        in: query
        required: false
        schema:
          type: integer
          format: int64
      - name: from
        in: query
        required: false
        schema:
          type: string
          format: date
      - name: to
        in: query
        required: false
        schema:
          type: string
          format: date
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseListSalesSlipResponse'
    post:
      tags:
      - sales-controller
      operationId: createSalesSlip
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SalesSlipCreateRequest'
        required: true
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseSalesSlipResponse'
  /api/sales-slips/{salesSlipId}/confirm-payment:
    post:
      tags:
      - sales-controller
      operationId: confirmPayment
      parameters:
      - name: salesSlipId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ManualPaymentRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseSalesSlipResponse'
  /api/sales-slips/{salesSlipId}/sales-status:
    patch:
      tags:
      - sales-controller
      operationId: updateSalesStatus
      parameters:
      - name: salesSlipId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SalesSlipStatusUpdateRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseSalesSlipResponse'
  /api/sales/orchid-groups/search:
    get:
      tags:
      - sales-controller
      operationId: searchSalesOrchidGroups
      parameters:
      - name: keyword
        in: query
        required: false
        schema:
          type: string
      - name: varietyId
        in: query
        required: false
        schema:
          type: integer
          format: int64
      - name: status
        in: query
        required: false
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseListSalesOrchidGroupSearchResponse'
  /api/sales-slips/{salesSlipId}/print:
    get:
      tags:
      - print-controller
      operationId: getSalesSlipPrintData
      parameters:
      - name: salesSlipId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseSalesSlipResponse'
  /api/sales-slips/print:
    get:
      tags:
      - print-controller
      operationId: getPrintableSalesSlips
      parameters:
      - name: page
        in: query
        required: false
        schema:
          type: integer
          format: int32
          default: 0
      - name: size
        in: query
        required: false
        schema:
          type: integer
          format: int32
          default: 10
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseSalesSlipPageResponse'
  /api/sales-slips/page:
    get:
      tags:
      - sales-controller
      operationId: getSalesSlipPage
      parameters:
      - name: partnerId
        in: query
        required: false
        schema:
          type: integer
          format: int64
      - name: from
        in: query
        required: false
        schema:
          type: string
          format: date
      - name: to
        in: query
        required: false
        schema:
          type: string
          format: date
      - name: paymentStatus
        in: query
        required: false
        schema:
          type: string
      - name: salesStatus
        in: query
        required: false
        schema:
          type: string
      - name: keyword
        in: query
        required: false
        schema:
          type: string
      - name: page
        in: query
        required: false
        schema:
          type: integer
          format: int32
          default: 0
      - name: size
        in: query
        required: false
        schema:
          type: integer
          format: int32
          default: 10
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseSalesSlipPageResponse'
  /api/sales-slips/auction-shipments:
    get:
      tags:
      - sales-controller
      operationId: getAuctionShipmentOptions
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseListAuctionShipmentOptionResponse'
components:
  schemas:
    ApiResponseListAuctionShipmentOptionResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/AuctionShipmentOptionResponse'
        message:
          type: string
    ApiResponseListSalesOrchidGroupSearchResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/SalesOrchidGroupSearchResponse'
        message:
          type: string
    ApiResponseListSalesSlipResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/SalesSlipResponse'
        message:
          type: string
    ApiResponseSalesSlipPageResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/SalesSlipPageResponse'
        message:
          type: string
    ApiResponseSalesSlipResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/SalesSlipResponse'
        message:
          type: string
    AuctionShipmentOptionResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        shipmentDate:
          type: string
          format: date
        auctionHouseId:
          type: integer
          format: int64
        auctionMarket:
          type: string
        lots:
          type: array
          items:
            $ref: '#/components/schemas/Lot'
    BusinessPartnerResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        partnerType:
          type: string
          enum:
          - WHOLESALE
          - RETAIL
          - AUCTION_HOUSE
        ownerName:
          type: string
        phone:
          type: string
        address:
          type: string
        memo:
          type: string
        active:
          type: boolean
    Lot:
      type: object
      properties:
        id:
          type: integer
          format: int64
        itemName:
          type: string
        varietyName:
          type: string
        shipmentGrade:
          type: string
        shippedQuantity:
          type: integer
          format: int32
    ManualPaymentRequest:
      type: object
      properties:
        amount:
          type: integer
          format: int64
        paymentDate:
          type: string
          format: date
        paymentMethod:
          type: string
          maxLength: 30
          minLength: 0
        depositorName:
          type: string
          maxLength: 100
          minLength: 0
        worker:
          type: string
          maxLength: 100
          minLength: 0
        memo:
          type: string
          maxLength: 1000
          minLength: 0
      required:
      - amount
      - paymentDate
    SalesOrchidGroupSearchResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        varietyId:
          type: integer
          format: int64
        varietyName:
          type: string
        genus:
          type: string
        status:
          type: string
        quantity:
          type: integer
          format: int32
        reservedQuantity:
          type: integer
          format: int32
        availableQuantity:
          type: integer
          format: int32
        potSize:
          type: string
        ageYear:
          type: integer
          format: int32
        houseNumber:
          type: integer
          format: int32
        physicalBedNumber:
          type: integer
          format: int32
        bedZoneName:
          type: string
    SalesSlipCreateRequest:
      type: object
      properties:
        saleDate:
          type: string
          format: date
        salesType:
          type: string
          enum:
          - DIRECT
          - AUCTION
        partnerId:
          type: integer
          format: int64
        auctionShipmentId:
          type: integer
          format: int64
        paymentStatus:
          type: string
          maxLength: 50
          minLength: 0
        salesStatus:
          type: string
          maxLength: 50
          minLength: 0
        paymentMethod:
          type: string
          maxLength: 50
          minLength: 0
        memo:
          type: string
          maxLength: 1000
          minLength: 0
        items:
          type: array
          items:
            $ref: '#/components/schemas/SalesSlipItemRequest'
      required:
      - items
      - saleDate
    SalesSlipItemAllocationRequest:
      type: object
      properties:
        orchidGroupId:
          type: integer
          format: int64
        quantity:
          type: integer
          format: int32
          minimum: 1
      required:
      - orchidGroupId
      - quantity
    SalesSlipItemAllocationResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        orchidGroupId:
          type: integer
          format: int64
        varietyName:
          type: string
        allocatedQuantity:
          type: integer
          format: int32
        availableQuantity:
          type: integer
          format: int32
        houseNumber:
          type: integer
          format: int32
        physicalBedNumber:
          type: integer
          format: int32
        bedZoneName:
          type: string
    SalesSlipItemRequest:
      type: object
      properties:
        itemName:
          type: string
          maxLength: 150
          minLength: 0
        genus:
          type: string
          maxLength: 100
          minLength: 0
        spec:
          type: string
          maxLength: 100
          minLength: 0
        quantity:
          type: integer
          format: int32
          minimum: 1
        unitPrice:
          type: integer
          format: int32
          minimum: 0
        memo:
          type: string
          maxLength: 1000
          minLength: 0
        allocations:
          type: array
          items:
            $ref: '#/components/schemas/SalesSlipItemAllocationRequest'
      required:
      - allocations
      - itemName
      - quantity
      - unitPrice
    SalesSlipItemResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        auctionShipmentLotId:
          type: integer
          format: int64
        itemName:
          type: string
        genus:
          type: string
        spec:
          type: string
        quantity:
          type: integer
          format: int32
        unitPrice:
          type: integer
          format: int32
        amount:
          type: integer
          format: int32
        memo:
          type: string
        allocations:
          type: array
          items:
            $ref: '#/components/schemas/SalesSlipItemAllocationResponse'
    SalesSlipListItemResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        slipNumber:
          type: string
        saleDate:
          type: string
          format: date
        salesType:
          type: string
          enum:
          - DIRECT
          - AUCTION
        auctionShipmentId:
          type: integer
          format: int64
        auctionMarket:
          type: string
        partner:
          $ref: '#/components/schemas/BusinessPartnerResponse'
        totalAmount:
          type: integer
          format: int32
        expectedPaymentDate:
          type: string
          format: date
        paidAmount:
          type: integer
          format: int64
        remainingAmount:
          type: integer
          format: int64
        paymentStatus:
          type: string
        salesStatus:
          type: string
        paymentMethod:
          type: string
        memo:
          type: string
    SalesSlipPageResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/SalesSlipListItemResponse'
        page:
          type: integer
          format: int32
        size:
          type: integer
          format: int32
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
          format: int32
    SalesSlipResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        slipNumber:
          type: string
        saleDate:
          type: string
          format: date
        salesType:
          type: string
          enum:
          - DIRECT
          - AUCTION
        auctionShipmentId:
          type: integer
          format: int64
        auctionMarket:
          type: string
        partner:
          $ref: '#/components/schemas/BusinessPartnerResponse'
        totalAmount:
          type: integer
          format: int32
        expectedPaymentDate:
          type: string
          format: date
        paidAmount:
          type: integer
          format: int64
        remainingAmount:
          type: integer
          format: int64
        paymentStatus:
          type: string
        salesStatus:
          type: string
        paymentMethod:
          type: string
        memo:
          type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/SalesSlipItemResponse'
    SalesSlipStatusUpdateRequest:
      type: object
      properties:
        salesStatus:
          type: string
          maxLength: 50
          minLength: 0
        memo:
          type: string
          maxLength: 1000
          minLength: 0
      required:
      - salesStatus
