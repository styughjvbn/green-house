openapi: 3.1.0
info:
  title: Greenhouse API Slice - work
  version: 0.0.1
servers:
- url: http://localhost:8080
  description: Generated server url
paths:
  /api/work-types:
    get:
      tags:
      - work-type-controller
      operationId: getWorkTypes
      parameters:
      - name: includeInactive
        in: query
        required: false
        schema:
          type: boolean
          default: false
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseListWorkTypeResponse'
    post:
      tags:
      - work-type-controller
      operationId: createWorkType
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkTypeCreateRequest'
        required: true
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseWorkTypeResponse'
  /api/work-types/{workTypeId}:
    patch:
      tags:
      - work-type-controller
      operationId: updateWorkType
      parameters:
      - name: workTypeId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkTypeUpdateRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseWorkTypeResponse'
  /api/work-types/reorder:
    patch:
      tags:
      - work-type-controller
      operationId: reorderWorkTypes
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkTypeReorderRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseListWorkTypeResponse'
components:
  schemas:
    ApiResponseListWorkTypeResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/WorkTypeResponse'
        message:
          type: string
    ApiResponseWorkTypeResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/WorkTypeResponse'
        message:
          type: string
    WorkTypeCreateRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 50
          minLength: 0
        template:
          type: string
          enum:
          - PESTICIDE
          - FERTILIZER
          - REPOT
          - CLEANUP
          - DISCARD
          - STATUS
          - MEMO
          - MOVEMENT
          - MULTI_CREATE
          - CORRECTION
      required:
      - name
      - template
    WorkTypeReorderRequest:
      type: object
      properties:
        orderedIds:
          type: array
          items:
            type: integer
            format: int64
          minItems: 1
      required:
      - orderedIds
    WorkTypeResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        code:
          type: string
        name:
          type: string
        template:
          type: string
          enum:
          - PESTICIDE
          - FERTILIZER
          - REPOT
          - CLEANUP
          - DISCARD
          - STATUS
          - MEMO
          - MOVEMENT
          - MULTI_CREATE
          - CORRECTION
        defaultType:
          type: boolean
        systemType:
          type: boolean
        active:
          type: boolean
        sortOrder:
          type: integer
          format: int32
    WorkTypeUpdateRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 50
          minLength: 0
        template:
          type: string
          enum:
          - PESTICIDE
          - FERTILIZER
          - REPOT
          - CLEANUP
          - DISCARD
          - STATUS
          - MEMO
          - MOVEMENT
          - MULTI_CREATE
          - CORRECTION
        active:
          type: boolean
      required:
      - name
      - template
