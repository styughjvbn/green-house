openapi: 3.1.0
info:
  title: Greenhouse API Slice - auth
  version: 0.0.1
servers:
- url: http://localhost:8080
  description: Generated server url
paths:
  /api/auth/logout:
    post:
      tags:
      - auth-controller
      operationId: logout
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseVoid'
  /api/auth/login:
    post:
      tags:
      - auth-controller
      operationId: login
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAuthenticatedUserResponse'
  /api/auth/me:
    get:
      tags:
      - auth-controller
      operationId: me
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAuthenticatedUserResponse'
components:
  schemas:
    ApiResponseAuthenticatedUserResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/AuthenticatedUserResponse'
        message:
          type: string
    ApiResponseVoid:
      type: object
      properties:
        data: {}
        message:
          type: string
    AuthenticatedUserResponse:
      type: object
      properties:
        username:
          type: string
        role:
          type: string
          enum:
          - ADMIN
          - WORKER
    LoginRequest:
      type: object
      properties:
        username:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 1
      required:
      - password
      - username
