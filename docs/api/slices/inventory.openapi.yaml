          type: integer
          format: int32
          default: 10
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseVarietyPageResponse'
    post:
      tags:
      - variety-controller
      operationId: create_1
