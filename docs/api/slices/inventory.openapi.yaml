openapi: 3.1.0
info:
  title: Greenhouse API Slice - 품종/입고 관리
  version: 0.0.1
  description: 품종 CRUD, 자재 CRUD, 입고 기록 관리 API
servers:
- url: http://localhost:8080
  description: Generated server url
