openapi: 3.1.0
info:
  title: Greenhouse API Slice - 입금/정산 이벤트
  version: v0
  description: 수동 입금 확인, 입금 이벤트 조회, 거래처 잔액 요약 API
servers:
- url: http://localhost:8080
  description: Generated server url
paths:
  /api/sales-slips/{salesSlipId}/confirm-payment:
    post:
      tags:
      - payment-controller
      operationId: confirmSalesSlipPayment
      parameters:
      - name: salesSlipId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ManualPaymentRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ApiResponseSalesSlipResponse'
  /api/auction-settlements/{settlementId}/confirm-payment:
    post:
      tags:
      - payment-controller
      operationId: confirmAuctionPayment
      parameters:
      - name: settlementId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ManualPaymentRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ApiResponseAuctionSettlementResponse'
  /api/partner-payment-events:
    get:
      tags:
      - payment-controller
      operationId: getEvents
      parameters:
      - name: partnerId
        in: query
        required: false
        schema:
          type: integer
          format: int64
      - name: targetType
        in: query
        required: false
        schema:
          type: string
          enum:
          - SALES_SLIP
          - AUCTION_SETTLEMENT
          - NONE
      - name: targetId
        in: query
        required: false
        schema:
          type: integer
          format: int64
      responses:
        '200':
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ApiResponseListPartnerPaymentEventResponse'
  /api/business-partners/{partnerId}/balance-summary:
    get:
      tags:
      - payment-controller
      operationId: getBalance
      parameters:
      - name: partnerId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        '200':
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ApiResponsePartnerBalanceSummaryResponse'
components:
  schemas:
    ApiResponseAuctionSettlementResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/AuctionSettlementResponse'
        message:
          type: string
    ApiResponseListPartnerPaymentEventResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/PartnerPaymentEventResponse'
        message:
          type: string
    ApiResponsePartnerBalanceSummaryResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/PartnerBalanceSummaryResponse'
        message:
          type: string
    ApiResponseSalesSlipResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/SalesSlipResponse'
        message:
          type: string
    AuctionSettlementLineResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        auctionResultLineId:
          type: integer
          format: int64
        auctionShipmentLotId:
          type: integer
          format: int64
        shipmentDate:
          type: string
          format: date
        varietyName:
          type: string
        shipmentGrade:
          type: string
        quantity:
          type: integer
          format: int32
        unitPrice:
          type: integer
          format: int32
        amount:
          type: integer
          format: int64
        status:
          type: string
          enum:
          - UNPAID
          - PAID
          - PARTIALLY_PAID
          - EXCLUDED
          - REVIEW_REQUIRED
    AuctionSettlementResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        auctionHouseId:
          type: integer
          format: int64
        auctionHouseName:
          type: string
        auctionDate:
          type: string
          format: date
        resultReceivedAt:
          type: string
          format: date-time
        expectedPaymentDate:
          type: string
          format: date
        grossAmount:
          type: integer
          format: int64
        feeAmount:
          type: integer
          format: int64
        deductionAmount:
          type: integer
          format: int64
        expectedDepositAmount:
          type: integer
          format: int64
        paidAmount:
          type: integer
          format: int64
        remainingAmount:
          type: integer
          format: int64
        status:
          type: string
          enum:
          - CREATED
          - PAYMENT_WAITING
          - PARTIALLY_PAID
          - PAID
          - AMOUNT_MISMATCH
          - REVIEW_REQUIRED
          - CANCELLED
        memo:
          type: string
        confirmedAt:
          type: string
          format: date-time
        confirmedBy:
          type: string
        lines:
          type: array
          items:
            $ref: '#/components/schemas/AuctionSettlementLineResponse'
    BusinessPartnerResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        partnerType:
          type: string
          enum:
          - WHOLESALE
          - RETAIL
          - AUCTION_HOUSE
        ownerName:
          type: string
        phone:
          type: string
        address:
          type: string
        memo:
          type: string
        active:
          type: boolean
    ManualPaymentRequest:
      type: object
      properties:
        amount:
          type: integer
          format: int64
        paymentDate:
          type: string
          format: date
        paymentMethod:
          type: string
          maxLength: 30
          minLength: 0
        depositorName:
          type: string
          maxLength: 100
          minLength: 0
        worker:
          type: string
          maxLength: 100
          minLength: 0
        memo:
          type: string
          maxLength: 1000
          minLength: 0
      required:
      - amount
      - paymentDate
    PartnerBalanceSummaryResponse:
      type: object
      properties:
        partnerId:
          type: integer
          format: int64
        partnerName:
          type: string
        creditBalance:
          type: integer
          format: int64
        unappliedPaymentAmount:
          type: integer
          format: int64
        receivableBalance:
          type: integer
          format: int64
    PartnerPaymentEventResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        partnerId:
          type: integer
          format: int64
        partnerName:
          type: string
        eventType:
          type: string
          enum:
          - PAYMENT_RECEIVED
          - PAYMENT_ALLOCATED
          - PREPAYMENT_RECEIVED
          - CREDIT_APPLIED
          - CREDIT_REFUND
          - AUTO_MATCH_CANDIDATE
          - AUTO_MATCH_CONFIRMED
          - MANUAL_MATCH_CONFIRMED
          - MATCH_REJECTED
          - PAYMENT_UNLINKED
          - ADJUSTMENT
        eventDate:
          type: string
          format: date
        amount:
          type: integer
          format: int64
        unappliedAmount:
          type: integer
          format: int64
        targetType:
          type: string
          enum:
          - SALES_SLIP
          - AUCTION_SETTLEMENT
          - NONE
        targetId:
          type: integer
          format: int64
        parentEventId:
          type: integer
          format: int64
        paymentMethod:
          type: string
        depositorName:
          type: string
        description:
          type: string
        status:
          type: string
          enum:
          - UNAPPLIED
          - PARTIALLY_APPLIED
          - FULLY_APPLIED
          - CANDIDATE
          - CONFIRMED
          - REJECTED
          - CANCELLED
        memo:
          type: string
        createdBy:
          type: string
    SalesSlipItemResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        orchidGroupId:
          type: integer
          format: int64
        auctionShipmentLotId:
          type: integer
          format: int64
        itemName:
          type: string
        genus:
          type: string
        spec:
          type: string
        quantity:
          type: integer
          format: int32
        unitPrice:
          type: integer
          format: int32
        amount:
          type: integer
          format: int32
        memo:
          type: string
    SalesSlipResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        slipNumber:
          type: string
        saleDate:
          type: string
          format: date
        salesType:
          type: string
          enum:
          - DIRECT
          - AUCTION
        auctionShipmentId:
          type: integer
          format: int64
        auctionMarket:
          type: string
        partner:
          $ref: '#/components/schemas/BusinessPartnerResponse'
        totalAmount:
          type: integer
          format: int32
        expectedPaymentDate:
          type: string
          format: date
        paidAmount:
          type: integer
          format: int64
        remainingAmount:
          type: integer
          format: int64
        paymentStatus:
          type: string
        salesStatus:
          type: string
        paymentMethod:
          type: string
        memo:
          type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/SalesSlipItemResponse'
