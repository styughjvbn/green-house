openapi: 3.1.0
info:
  title: Greenhouse API Slice - 난 묶음 사용자 그룹
  version: v0
  description: 사용자가 지속적으로 관리하는 난 묶음 그룹과 소속 관리 API
servers:
  - url: http://localhost:8080
paths:
  /api/orchid-group-collections:
    get:
      tags: [orchid-group-collection-controller]
      operationId: getOrchidGroupCollections
      parameters:
        - name: includeArchived
          in: query
          required: false
          schema: {type: boolean, default: false}
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseListOrchidGroupCollectionResponse'
    post:
      tags: [orchid-group-collection-controller]
      operationId: createOrchidGroupCollection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrchidGroupCollectionCreateRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseOrchidGroupCollectionResponse'
  /api/orchid-group-collections/{collectionId}:
    parameters:
      - $ref: '#/components/parameters/CollectionId'
    get:
      tags: [orchid-group-collection-controller]
      operationId: getOrchidGroupCollection
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseOrchidGroupCollectionResponse'
    patch:
      tags: [orchid-group-collection-controller]
      operationId: updateOrchidGroupCollection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrchidGroupCollectionUpdateRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseOrchidGroupCollectionResponse'
  /api/orchid-group-collections/{collectionId}/archive:
    post:
      tags: [orchid-group-collection-controller]
      operationId: archiveOrchidGroupCollection
      parameters:
        - $ref: '#/components/parameters/CollectionId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseOrchidGroupCollectionResponse'
  /api/orchid-group-collections/{collectionId}/members:
    post:
      tags: [orchid-group-collection-controller]
      operationId: addOrchidGroupCollectionMembers
      parameters:
        - $ref: '#/components/parameters/CollectionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrchidGroupCollectionMemberAddRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseOrchidGroupCollectionResponse'
  /api/orchid-group-collections/{collectionId}/members/{orchidGroupId}:
    delete:
      tags: [orchid-group-collection-controller]
      operationId: removeOrchidGroupCollectionMember
      parameters:
        - $ref: '#/components/parameters/CollectionId'
        - name: orchidGroupId
          in: path
          required: true
          schema: {type: integer, format: int64}
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseOrchidGroupCollectionResponse'
  /api/orchid-groups/{orchidGroupId}/collections:
    get:
      tags: [orchid-group-collection-controller]
      operationId: getCollectionsForOrchidGroup
      parameters:
        - name: orchidGroupId
          in: path
          required: true
          schema: {type: integer, format: int64}
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseListOrchidGroupCollectionResponse'
components:
  parameters:
    CollectionId:
      name: collectionId
      in: path
      required: true
      schema: {type: integer, format: int64}
  schemas:
    OrchidGroupCollectionCreateRequest:
      type: object
      required: [name]
      properties:
        name: {type: string, maxLength: 100}
        description: {type: string, maxLength: 1000}
        purpose: {type: string, maxLength: 200}
        createdBy: {type: string, maxLength: 100}
    OrchidGroupCollectionUpdateRequest:
      type: object
      required: [name]
      properties:
        name: {type: string, maxLength: 100}
        description: {type: string, maxLength: 1000}
        purpose: {type: string, maxLength: 200}
    OrchidGroupCollectionMemberAddRequest:
      type: object
      required: [orchidGroupIds]
      properties:
        orchidGroupIds:
          type: array
          minItems: 1
          uniqueItems: true
          items: {type: integer, format: int64}
        createdBy: {type: string, maxLength: 100}
    OrchidGroupCollectionMemberResponse:
      type: object
      properties:
        membershipId: {type: integer, format: int64}
        orchidGroupId: {type: integer, format: int64}
        varietyName: {type: string}
        quantity: {type: integer, format: int32}
        status: {type: string}
        potSize: {type: string}
        ageYear: {type: integer, format: int32}
        houseNumber: {type: integer, format: int32}
        physicalBedNumber: {type: integer, format: int32}
        bedZoneName: {type: string}
        joinedAt: {type: string, format: date-time}
    OrchidGroupCollectionResponse:
      type: object
      properties:
        id: {type: integer, format: int64}
        name: {type: string}
        description: {type: string}
        purpose: {type: string}
        status: {type: string, enum: [ACTIVE, ARCHIVED]}
        orchidGroupCount: {type: integer, format: int32}
        totalQuantity: {type: integer, format: int32}
        createdBy: {type: string}
        createdAt: {type: string, format: date-time}
        updatedAt: {type: string, format: date-time}
        members:
          type: array
          items: {$ref: '#/components/schemas/OrchidGroupCollectionMemberResponse'}
    ApiResponseOrchidGroupCollectionResponse:
      type: object
      properties:
        data: {$ref: '#/components/schemas/OrchidGroupCollectionResponse'}
        message: {type: string}
    ApiResponseListOrchidGroupCollectionResponse:
      type: object
      properties:
        data:
          type: array
          items: {$ref: '#/components/schemas/OrchidGroupCollectionResponse'}
        message: {type: string}
