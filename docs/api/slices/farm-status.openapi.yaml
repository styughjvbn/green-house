openapi: 3.1.0
info:
  title: Greenhouse API Slice - farm-status
  version: 0.0.1
servers:
- url: http://localhost:8080
  description: Generated server url
paths:
  /api/farm-status/zoom:
    get:
      tags:
      - farm-status-controller
      operationId: getZoom
      parameters:
      - name: level
        in: query
        required: true
        schema:
          type: string
          enum:
          - HOUSE
          - PHYSICAL_BED
          - BED_ZONE
      - name: houseId
        in: query
        required: false
        schema:
          type: integer
          format: int64
      - name: physicalBedId
        in: query
        required: false
        schema:
          type: integer
          format: int64
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseFarmStatusZoomResponse'
  /api/farm-status/orchid-management:
    get:
      tags:
      - farm-status-controller
      operationId: getOrchidManagementViewport
      parameters:
      - name: startBedId
        in: query
        required: false
        schema:
          type: integer
          format: int64
      - name: bedCount
        in: query
        required: false
        schema:
          type: integer
          format: int32
          default: 3
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseOrchidManagementViewportResponse'
  /api/farm-status/orchid-groups:
    get:
      tags:
      - farm-status-controller
      operationId: getOrchidGroups_2
      parameters:
      - name: targetType
        in: query
        required: true
        schema:
          type: string
          enum:
          - HOUSE
          - PHYSICAL_BED
          - BED_ZONE
      - name: targetId
        in: query
        required: true
        schema:
          type: integer
          format: int64
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseFarmStatusOrchidGroupListResponse'
  /api/farm-status/map:
    get:
      tags:
      - farm-status-controller
      operationId: getMap
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseFarmStatusMapResponse'
  /api/dashboard/summary:
    get:
      tags:
      - dashboard-controller
      operationId: getSummary
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseDashboardSummaryResponse'
components:
  schemas:
    ApiResponseDashboardSummaryResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/DashboardSummaryResponse'
        message:
          type: string
    ApiResponseFarmStatusMapResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/FarmStatusMapResponse'
        message:
          type: string
    ApiResponseFarmStatusOrchidGroupListResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/FarmStatusOrchidGroupListResponse'
        message:
          type: string
    ApiResponseFarmStatusZoomResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/FarmStatusZoomResponse'
        message:
          type: string
    ApiResponseOrchidManagementViewportResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/OrchidManagementViewportResponse'
        message:
          type: string
    BedZoneResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        physicalBedId:
          type: integer
          format: int64
        physicalBedNumber:
          type: integer
          format: int32
        houseId:
          type: integer
          format: int64
        houseNumber:
          type: integer
          format: int32
        name:
          type: string
        side:
          type: string
          enum:
          - LEFT
          - RIGHT
          - CUSTOM
          - HANGING
        zoneType:
          type: string
          enum:
          - DEFAULT
          - CUSTOM
          - HANGING
          - TRAY
          - GRID
        sortOrder:
          type: integer
          format: int32
        active:
          type: boolean
        memo:
          type: string
        orchidGroups:
          type: array
          items:
            $ref: '#/components/schemas/OrchidGroupResponse'
    DashboardSummaryResponse:
      type: object
      properties:
        houseCount:
          type: integer
          format: int64
        physicalBedCount:
          type: integer
          format: int64
        bedZoneCount:
          type: integer
          format: int64
        orchidGroupCount:
          type: integer
          format: int64
        warningCount:
          type: integer
          format: int64
        repotDueCount:
          type: integer
          format: int64
        latestWorkDate:
          type: string
    FarmStatusMapBedZoneResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        physicalBedId:
          type: integer
          format: int64
        physicalBedNumber:
          type: integer
          format: int32
        houseId:
          type: integer
          format: int64
        houseNumber:
          type: integer
          format: int32
        name:
          type: string
        side:
          type: string
          enum:
          - LEFT
          - RIGHT
          - CUSTOM
          - HANGING
        zoneType:
          type: string
          enum:
          - DEFAULT
          - CUSTOM
          - HANGING
          - TRAY
          - GRID
        sortOrder:
          type: integer
          format: int32
        active:
          type: boolean
        memo:
          type: string
    FarmStatusMapOrchidGroupResponse:
      type: object
      properties:
        orchidGroupId:
          type: integer
          format: int64
        houseId:
          type: integer
          format: int64
        physicalBedId:
          type: integer
          format: int64
        bedZoneId:
          type: integer
          format: int64
        startPosition:
          type: number
        endPosition:
          type: number
        varietyId:
          type: integer
          format: int64
        varietyName:
          type: string
        quantity:
          type: integer
          format: int32
        status:
          type: string
        ageYear:
          type: integer
          format: int32
        potSize:
          type: string
        sortOrder:
          type: integer
          format: int32
    FarmStatusMapPhysicalBedResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        houseId:
          type: integer
          format: int64
        houseNumber:
          type: integer
          format: int32
        number:
          type: integer
          format: int32
        displayOrder:
          type: integer
          format: int32
        lengthCm:
          type: integer
          format: int32
        widthCm:
          type: integer
          format: int32
        wireCount:
          type: integer
          format: int32
        supportIntervalCm:
          type: integer
          format: int32
        positionUnitCount:
          type: number
        positionUnitLabel:
          type: string
        memo:
          type: string
        bedZones:
          type: array
          items:
            $ref: '#/components/schemas/FarmStatusMapBedZoneResponse'
    FarmStatusMapResponse:
      type: object
      properties:
        houses:
          type: array
          items:
            $ref: '#/components/schemas/HouseStatusSummaryResponse'
        orchidGroups:
          type: array
          items:
            $ref: '#/components/schemas/FarmStatusMapOrchidGroupResponse'
    FarmStatusOrchidGroupItemResponse:
      type: object
      properties:
        orchidGroupId:
          type: integer
          format: int64
        varietyName:
          type: string
        genus:
          type: string
        quantity:
          type: integer
          format: int32
        status:
          type: string
        houseId:
          type: integer
          format: int64
        houseNumber:
          type: integer
          format: int32
        physicalBedId:
          type: integer
          format: int64
        physicalBedNumber:
          type: integer
          format: int32
        physicalBedName:
          type: string
        bedZoneId:
          type: integer
          format: int64
        bedZoneName:
          type: string
    FarmStatusOrchidGroupListResponse:
      type: object
      properties:
        targetType:
          type: string
          enum:
          - HOUSE
          - PHYSICAL_BED
          - BED_ZONE
        targetId:
          type: integer
          format: int64
        targetName:
          type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/FarmStatusOrchidGroupItemResponse'
    FarmStatusZoomResponse:
      type: object
      properties:
        level:
          type: string
          enum:
          - HOUSE
          - PHYSICAL_BED
          - BED_ZONE
        houseId:
          type: integer
          format: int64
        houseNumber:
          type: integer
          format: int32
        physicalBeds:
          type: array
          items:
            $ref: '#/components/schemas/PhysicalBedResponse'
        bedZones:
          type: array
          items:
            $ref: '#/components/schemas/BedZoneResponse'
    HouseStatusSummaryResponse:
      type: object
      properties:
        houseId:
          type: integer
          format: int64
        houseNumber:
          type: integer
          format: int32
        houseName:
          type: string
        orchidGroupCount:
          type: integer
          format: int64
        warningCount:
          type: integer
          format: int64
        repotDueCount:
          type: integer
          format: int64
        latestWorkDate:
          type: string
        physicalBeds:
          type: array
          items:
            $ref: '#/components/schemas/FarmStatusMapPhysicalBedResponse'
    OrchidGroupResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        bedZoneId:
          type: integer
          format: int64
        varietyId:
          type: integer
          format: int64
        genus:
          type: string
        varietyName:
          type: string
        quantity:
          type: integer
          format: int32
        potSize:
          type: string
        potSizeCode:
          type: string
          enum:
          - UNSPECIFIED
          - UNMAPPED
          - POT_2
          - POT_2_5
          - POT_3
          - POT_3_5
          - POT_4
          - POT_4_5
          - POT_5
          - POT_6
          - HANGING
          - ETC
        ageYear:
          type: integer
          format: int32
        status:
          type: string
        placementType:
          type: string
        trayCount:
          type: integer
          format: int32
        splitPlacementAllowed:
          type: boolean
        startPosition:
          type: number
        endPosition:
          type: number
        sortOrder:
          type: integer
          format: int32
        memo:
          type: string
        houseId:
          type: integer
          format: int64
        houseNumber:
          type: integer
          format: int32
        physicalBedNumber:
          type: integer
          format: int32
        bedZoneName:
          type: string
    OrchidManagementBedOrderResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        houseId:
          type: integer
          format: int64
        houseNumber:
          type: integer
          format: int32
        number:
          type: integer
          format: int32
    OrchidManagementSummaryResponse:
      type: object
      properties:
        orchidGroupCount:
          type: integer
          format: int64
        totalQuantity:
          type: integer
          format: int64
        abnormalCount:
          type: integer
          format: int64
        bedZoneCount:
          type: integer
          format: int64
    OrchidManagementViewportResponse:
      type: object
      properties:
        startBedId:
          type: integer
          format: int64
        bedCount:
          type: integer
          format: int32
        beds:
          type: array
          items:
            $ref: '#/components/schemas/PhysicalBedResponse'
        hasPrevious:
          type: boolean
        hasNext:
          type: boolean
        summary:
          $ref: '#/components/schemas/OrchidManagementSummaryResponse'
        bedOrder:
          type: array
          items:
            $ref: '#/components/schemas/OrchidManagementBedOrderResponse'
    PhysicalBedResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        houseId:
          type: integer
          format: int64
        houseNumber:
          type: integer
          format: int32
        number:
          type: integer
          format: int32
        displayOrder:
          type: integer
          format: int32
        lengthCm:
          type: integer
          format: int32
        widthCm:
          type: integer
          format: int32
        wireCount:
          type: integer
          format: int32
        supportIntervalCm:
          type: integer
          format: int32
        positionUnitCount:
          type: number
        positionUnitLabel:
          type: string
        memo:
          type: string
        bedZones:
          type: array
          items:
            $ref: '#/components/schemas/BedZoneResponse'
