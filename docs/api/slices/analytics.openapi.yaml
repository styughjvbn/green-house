openapi: 3.1.0
info:
  title: Greenhouse API Slice - analytics
  version: 0.0.1
servers:
- url: http://localhost:8080
  description: Generated server url
paths:
  /api/analytics/work:
    get:
      tags:
      - analytics-controller
      operationId: getWorkAnalytics
      parameters:
      - name: from
        in: query
        required: false
        schema:
          type: string
          format: date
      - name: to
        in: query
        required: false
        schema:
          type: string
          format: date
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseWorkAnalyticsResponse'
  /api/analytics/sales:
    get:
      tags:
      - analytics-controller
      operationId: getSalesAnalytics
      parameters:
      - name: from
        in: query
        required: false
        schema:
          type: string
          format: date
      - name: to
        in: query
        required: false
        schema:
          type: string
          format: date
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseSalesAnalyticsResponse'
  /api/analytics/partners:
    get:
      tags:
      - analytics-controller
      operationId: getPartnerAnalytics
      parameters:
      - name: from
        in: query
        required: false
        schema:
          type: string
          format: date
      - name: to
        in: query
        required: false
        schema:
          type: string
          format: date
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponsePartnerAnalyticsResponse'
components:
  schemas:
    AnalyticsInsightResponse:
      type: object
      properties:
        tone:
          type: string
        text:
          type: string
        actionLabel:
          type: string
        actionHref:
          type: string
    AnalyticsRankedValueResponse:
      type: object
      properties:
        label:
          type: string
        value:
          type: integer
          format: int64
        secondary:
          type: string
    AnalyticsSlipSummaryResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        slipNumber:
          type: string
        saleDate:
          type: string
          format: date
        partnerName:
          type: string
        totalAmount:
          type: integer
          format: int32
        paidAmount:
          type: integer
          format: int64
        remainingAmount:
          type: integer
          format: int64
        paymentStatus:
          type: string
        salesStatus:
          type: string
    ApiResponsePartnerAnalyticsResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/PartnerAnalyticsResponse'
        message:
          type: string
    ApiResponseSalesAnalyticsResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/SalesAnalyticsResponse'
        message:
          type: string
    ApiResponseWorkAnalyticsResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/WorkAnalyticsResponse'
        message:
          type: string
    PartnerAnalyticsResponse:
      type: object
      properties:
        partnerStats:
          type: array
          items:
            $ref: '#/components/schemas/PartnerAnalyticsStatResponse'
        partnerSales:
          type: array
          items:
            $ref: '#/components/schemas/AnalyticsRankedValueResponse'
    PartnerAnalyticsStatResponse:
      type: object
      properties:
        partnerId:
          type: integer
          format: int64
        partnerName:
          type: string
        partnerType:
          type: string
          enum:
          - WHOLESALE
          - RETAIL
          - AUCTION_HOUSE
        totalSales:
          type: integer
          format: int64
        transactionCount:
          type: integer
          format: int64
        unpaidAmount:
          type: integer
          format: int64
        paidAmount:
          type: integer
          format: int64
        receivableBalance:
          type: integer
          format: int64
        creditBalance:
          type: integer
          format: int64
        unappliedPaymentAmount:
          type: integer
          format: int64
        latestSaleDate:
          type: string
          format: date
    SalesAnalyticsResponse:
      type: object
      properties:
        currentMonthSales:
          type: integer
          format: int64
        shippedQuantity:
          type: integer
          format: int64
        unpaidAmount:
          type: integer
          format: int64
        monthlySales:
          type: array
          items:
            $ref: '#/components/schemas/AnalyticsRankedValueResponse'
        varietySales:
          type: array
          items:
            $ref: '#/components/schemas/AnalyticsRankedValueResponse'
        partnerSales:
          type: array
          items:
            $ref: '#/components/schemas/AnalyticsRankedValueResponse'
        paymentBreakdown:
          type: array
          items:
            $ref: '#/components/schemas/AnalyticsRankedValueResponse'
        recentSlips:
          type: array
          items:
            $ref: '#/components/schemas/AnalyticsSlipSummaryResponse'
        unpaidSlips:
          type: array
          items:
            $ref: '#/components/schemas/AnalyticsSlipSummaryResponse'
        salesInsights:
          type: array
          items:
            $ref: '#/components/schemas/AnalyticsInsightResponse'
    WorkAnalyticsResponse:
      type: object
      properties:
        totalCount:
          type: integer
          format: int64
        movementCount:
          type: integer
          format: int64
        statusCount:
          type: integer
          format: int64
        latestWorkDate:
          type: string
          format: date
        workTypeCounts:
          type: array
          items:
            $ref: '#/components/schemas/AnalyticsRankedValueResponse'
        recentRecords:
          type: array
          items:
            $ref: '#/components/schemas/WorkRecordResponse'
    WorkRecordResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        workTypeId:
          type: integer
          format: int64
        workType:
          type: string
        workTypeTemplate:
          type: string
          enum:
          - PESTICIDE
          - FERTILIZER
          - REPOT
          - CLEANUP
          - STATUS
          - MEMO
          - MOVEMENT
          - MULTI_CREATE
          - CORRECTION
        workDate:
          type: string
          format: date
        targetType:
          type: string
        targetId:
          type: integer
          format: int64
        materialName:
          type: string
        dilutionRatio:
          type: string
        quantity:
          type: string
        worker:
          type: string
        fromBedZoneId:
          type: integer
          format: int64
        toBedZoneId:
          type: integer
          format: int64
        details:
          type: object
          additionalProperties: {}
        memo:
          type: string
        status:
          type: string
          enum:
          - ACTIVE
          - CANCELED
        canceledAt:
          type: string
          format: date-time
        cancelReason:
          type: string
