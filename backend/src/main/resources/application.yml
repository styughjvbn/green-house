spring:
  application:
    name: backend

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/greenhouse}
    username: ${DATABASE_USERNAME:greenhouse}
    password: ${DATABASE_PASSWORD:greenhouse}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1

server:
  port: ${SERVER_PORT:8080}

app:
  cors:
    frontend-origin-patterns: "${FRONTEND_ORIGIN_PATTERNS:${FRONTEND_ORIGINS:${FRONTEND_ORIGIN:http://localhost:*,http://127.0.0.1:*,http://192.168.0.201:*,http://192.168.0.*:*}}}"

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui
    operations-sorter: method
    tags-sorter: alpha
  default-produces-media-type: application/json
  default-consumes-media-type: application/json
