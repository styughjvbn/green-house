spring.application.name=backend

spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/greenhouse}
spring.datasource.username=${DATABASE_USERNAME:greenhouse}
spring.datasource.password=${DATABASE_PASSWORD:greenhouse}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

server.port=${SERVER_PORT:8080}

app.cors.frontend-origin-patterns=${FRONTEND_ORIGIN_PATTERNS:${FRONTEND_ORIGINS:${FRONTEND_ORIGIN:http://localhost:*,http://127.0.0.1:*,http://192.168.0.201:*,http://192.168.0.*:*}}}
