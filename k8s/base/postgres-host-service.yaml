apiVersion: v1
kind: Service
metadata:
  name: green-house-postgres-host
  namespace: green-house
spec:
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: v1
kind: Endpoints
metadata:
  name: green-house-postgres-host
  namespace: green-house
subsets:
  - addresses:
      # mini-pc host PostgreSQL address. Change this before apply if different.
      - ip: 192.168.0.201
    ports:
      - name: postgres
        port: 5432
